name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Write capacitor config
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.tutanakmatik.app",
            "appName": "Tutanakmatik",
            "webDir": "www"
          }
          CAPEOF

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create app icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          # SVG ikon oluştur
          cat > /tmp/icon.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
            <rect width="192" height="192" rx="36" fill="#1a2744"/>
            <rect x="48" y="28" width="96" height="136" rx="8" fill="white"/>
            <rect x="62" y="54" width="68" height="8" rx="4" fill="#1a2744"/>
            <rect x="62" y="72" width="68" height="8" rx="4" fill="#1a2744"/>
            <rect x="62" y="90" width="68" height="8" rx="4" fill="#1a2744"/>
            <rect x="62" y="108" width="46" height="8" rx="4" fill="#1a2744"/>
            <rect x="38" y="20" width="58" height="22" rx="6" fill="#c9a84c"/>
            <rect x="44" y="26" width="46" height="10" rx="3" fill="#e8c97a"/>
          </svg>
          SVGEOF
          # ImageMagick ile PNG oluştur
          sudo apt-get install -y imagemagick -q 2>/dev/null || true
          convert -background none /tmp/icon.svg -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true
          convert -background none /tmp/icon.svg -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
          convert -background none /tmp/icon.svg -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
          convert -background none /tmp/icon.svg -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true
          convert -background none /tmp/icon.svg -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
          echo "Icons created"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tutanakmatik-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
