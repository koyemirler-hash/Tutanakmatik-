<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Tutanakmatik</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--navy:#1a2744;--navy2:#243259;--gold:#c9a84c;--goldf:#e8c97a;--bg:#f0f2f7;--border:#d0d6e8;--red:#c0392b;--green:#27ae60;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navy),var(--navy2));box-shadow:0 4px 20px rgba(26,39,68,.3);}
.hdr-in{max-width:960px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px;}
.hdr-logo{width:44px;height:44px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hdr-title h1{font-size:20px;font-weight:800;color:#fff;letter-spacing:1px;}
.hdr-title p{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;}
.tabs{background:var(--navy);border-top:1px solid rgba(255,255,255,.1);}
.tabs-in{max-width:960px;margin:0 auto;padding:0 20px;display:flex;gap:2px;}
.tb{padding:10px 16px;border:none;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:12px;font-weight:700;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.3px;}
.tb:hover{color:rgba(255,255,255,.8);}
.tb.on{color:var(--goldf);border-bottom-color:var(--gold);}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:20px;}
.panel{display:none;}.panel.on{display:block;}

/* CARD */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 14px rgba(26,39,68,.08);overflow:hidden;margin-bottom:18px;}
.ch{background:linear-gradient(90deg,var(--navy),var(--navy2));padding:13px 20px;display:flex;align-items:center;gap:8px;}
.ch h2{color:#fff;font-size:13px;font-weight:700;letter-spacing:.5px;}
.ch .bdg{background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;}
.cb{padding:20px;}

/* HIZLI ŞABLONLAR */
.sablon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:4px;}
.sablon-btn{padding:14px 10px;border:2px solid var(--border);border-radius:10px;background:#fafbfd;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;}
.sablon-btn:hover{border-color:var(--navy);background:#eef1ff;}
.sablon-btn.on{border-color:var(--navy);background:var(--navy);color:#fff;}
.sablon-btn .sb-icon{font-size:22px;display:block;margin-bottom:5px;}
.sablon-btn .sb-ad{font-size:12px;font-weight:700;}
.sablon-btn .sb-alt{font-size:10px;opacity:.7;margin-top:2px;}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fg label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#5a6480;}
input,select,textarea{border:2px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--navy);background:#fafbfd;font-family:inherit;width:100%;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy);background:#fff;}
textarea{resize:vertical;min-height:68px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ARAMA DROPDOWN */
.tur-wrap{position:relative;}
#tur-dd{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--navy);border-top:none;border-radius:0 0 10px 10px;max-height:260px;overflow-y:auto;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.15);}
.tur-opt{padding:9px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f2f7;transition:background .15s;}
.tur-opt:hover{background:#eef1ff;}
.opt-no{display:inline-block;background:var(--navy);color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;margin-right:6px;}

/* CEZA PANELİ */
.cpanel{margin-top:10px;padding:13px 15px;background:#f4f6ff;border:2px solid #ccd2f0;border-radius:10px;}
.cp-bas{font-weight:700;color:var(--navy);font-size:13px;margin-bottom:5px;}
.cp-mt{font-size:12px;color:#444;line-height:1.6;margin-bottom:11px;padding:8px 10px;background:#fff;border-radius:6px;border:1px solid #e0e4f0;}
.cp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#5a6480;margin-bottom:7px;}
.kez-row{display:flex;flex-wrap:wrap;gap:6px;}
.kb{padding:6px 13px;border-radius:20px;border:2px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--navy);}
.kb:hover{border-color:var(--navy);background:#eef1ff;}
.kb.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.kb.off{background:#f5f5f5;color:#bbb;border-color:#eee;cursor:not-allowed;}
.kez-res{margin-top:7px;font-size:12px;font-style:italic;color:#5a6480;}

/* BUTONLAR */
.fa{display:flex;gap:9px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap;}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;font-family:inherit;}
.btn-navy{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;box-shadow:0 4px 12px rgba(26,39,68,.25);}
.btn-navy:hover{transform:translateY(-1px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldf));color:var(--navy);box-shadow:0 4px 12px rgba(201,168,76,.3);}
.btn-gold:hover{transform:translateY(-1px);}
.btn-out{background:transparent;color:var(--navy);border:2px solid var(--border);}
.btn-out:hover{border-color:var(--navy);background:var(--bg);}

/* ÖNIZLEME */
.prev-wrap{display:none;}.prev-wrap.on{display:block;}
#preview{background:#fff;border:1px solid var(--border);border-radius:10px;padding:36px 44px;font-family:'Times New Roman',Georgia,serif;color:#111;line-height:1.9;box-shadow:0 2px 18px rgba(0,0,0,.06);}
.tk{text-align:center;margin-bottom:6px;}
.tk .ku{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.tk .ka{font-size:11px;color:#555;margin-top:2px;}
.thr1{border:none;border-top:2px solid #1a2744;margin:9px 0 3px;}
.thr2{border:none;border-top:1px solid #aaa;margin:3px 0 14px;}
.tb2{text-align:center;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;color:#1a2744;}
.tm{display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;}
.tm span{color:#555;}.tm strong{color:#111;}
.txt{font-size:14px;text-align:justify;margin-bottom:24px;line-height:2.05;}
.timz{margin-top:28px;font-size:13px;text-align:right;color:#444;font-style:italic;}
/* Olay Yeri şablonu */
.oy-yer{font-size:13px;font-weight:700;margin-bottom:14px;}
.oy-txt{font-size:14px;line-height:2.1;text-align:justify;}

/* AYARLAR */
.ss{margin-bottom:22px;}
.ss h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#5a6480;margin-bottom:9px;padding-bottom:6px;border-bottom:2px solid var(--border);}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.tag{background:var(--bg);border:2px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px;}
.tdel{background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;font-weight:700;padding:0;line-height:1;}
.add-row{display:flex;gap:7px;}
.add-row input{flex:1;}
.btn-add{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(60px);opacity:0;transition:all .3s;z-index:1000;color:#fff;}
.toast.on{transform:translateY(0);opacity:1;}
.toast.g{background:var(--gold);color:var(--navy);}
.toast.b{background:var(--navy);}

@media(max-width:580px){
  .grid2{grid-template-columns:1fr;}
  #preview{padding:20px 16px;}
  .tm{flex-direction:column;gap:3px;}
  .main{padding:12px;}
  .sablon-grid{grid-template-columns:1fr 1fr;}
}
@media print{
  body *{visibility:hidden;}
  #preview,#preview *{visibility:visible;}
  #preview{position:fixed;top:0;left:0;width:100%;padding:28px 36px;box-shadow:none;border:none;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-in">
    <div class="hdr-logo">📋</div>
    <div class="hdr-title">
      <h1>TUTANAKMAT<span style="color:var(--gold)">İ</span>K</h1>
      <p>Güvenlik Tutanak Yönetim Sistemi</p>
    </div>
  </div>
  <div class="tabs">
    <div class="tabs-in">
      <button class="tb on" onclick="gTab('olustur',this)">✏️ Tutanak Oluştur</button>
      <button class="tb" onclick="gTab('disiplin',this)">📋 Disiplin Cetveli</button>
      <button class="tb" onclick="gTab('ayarlar',this)">⚙️ Ayarlar</button>
    </div>
  </div>
</div>

<div class="main">

<!-- ══════════ OLUŞTUR ══════════ -->
<div id="tab-olustur" class="panel on">

  <!-- Hızlı Şablonlar -->
  <div class="card">
    <div class="ch"><h2>HIZLI ŞABLONLAR</h2><span class="bdg">ÖZEL</span></div>
    <div class="cb">
      <div class="sablon-grid" id="sablon-grid"></div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <div class="ch"><h2 id="form-baslik">YENİ TUTANAK</h2><span class="bdg">FORM</span></div>
    <div class="cb">

      <div class="grid2">
        <div class="fg">
          <label>📅 Tarih</label>
          <input type="date" id="tarih" readonly>
        </div>
        <div class="fg">
          <label>🌳 Park</label>
          <select id="park"><option value="">— Seçiniz —</option></select>
        </div>
        <div class="fg">
          <label>🕐 Vardiya Tipi</label>
          <select id="vtip" onchange="vtipDegis()">
            <option value="">— Seçiniz —</option>
            <option value="Sabit">Sabit Vardiya</option>
            <option value="1">1. Vardiya</option>
            <option value="2">2. Vardiya</option>
            <option value="3">3. Vardiya</option>
            <option value="4">4. Vardiya</option>
          </select>
        </div>
        <div class="fg">
          <label>🕑 Vardiya Saatleri</label>
          <select id="vsaat"><option value="">— Önce Tip Seçin —</option></select>
        </div>
        <div class="fg">
          <label>👤 Personel Adı Soyadı</label>
          <input type="text" id="personel" placeholder="Ad Soyad">
        </div>
        <div class="fg">
          <label>🎖️ Kıdem / Unvan</label>
          <select id="kidem"><option value="">— Seçiniz —</option></select>
        </div>
      </div>

      <!-- Tutanak Türü (Disiplin Cetveli) -->
      <div class="fg" id="fg-tur" style="margin-top:4px;">
        <label>🏛️ Tutanak Türü — Disiplin Ceza Cetveli</label>
        <div class="tur-wrap">
          <input type="text" id="tur-ara" placeholder="🔍 Madde ara... (örn: göreve gelme, park terk, 81)"
            oninput="turAra(this.value)" onfocus="turAc()" autocomplete="off">
          <input type="hidden" id="tur-no" value="">
          <div id="tur-dd"></div>
        </div>
        <div id="cpanel" class="cpanel" style="display:none;">
          <div class="cp-bas" id="cp-bas"></div>
          <div class="cp-mt" id="cp-mt"></div>
          <div class="cp-lbl">📊 Kaçıncı Kez Uygulanacak?</div>
          <div class="kez-row" id="kez-row"></div>
          <div class="kez-res" id="kez-res"></div>
        </div>
      </div>

      <div class="fg" style="margin-top:4px;">
        <label>📝 Ek Açıklama (İsteğe Bağlı)</label>
        <textarea id="aciklama" placeholder="Varsa ek bilgi..."></textarea>
      </div>

      <div class="fa">
        <button class="btn btn-out" onclick="temizle()">🗑️ Temizle</button>
        <button class="btn btn-navy" onclick="olustur()">📄 Tutanak Oluştur</button>
      </div>
    </div>
  </div>

  <!-- Önizleme -->
  <div class="prev-wrap" id="prev-wrap">
    <div class="card">
      <div class="ch"><h2>TUTANAK ÖNİZLEME</h2><span class="bdg">HAZIR</span></div>
      <div class="cb">
        <div id="preview"></div>
        <div class="fa" style="margin-top:16px;">
          <button class="btn btn-out" onclick="window.print()">🖨️ Yazdır</button>
          <button class="btn btn-gold" onclick="pdfAl()">⬇️ PDF İndir</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ══════════ DİSİPLİN CETVELİ ══════════ -->
<div id="tab-disiplin" class="panel">
  <div class="card">
    <div class="ch"><h2>DİSİPLİN CEZA CETVELİ</h2><span class="bdg">89 MADDE</span></div>
    <div class="cb">
      <input type="text" placeholder="🔍 Madde ara..." oninput="cetvelAra(this.value)" style="margin-bottom:14px;">
      <div id="cetveltablo"></div>
    </div>
  </div>
</div>

<!-- ══════════ AYARLAR ══════════ -->
<div id="tab-ayarlar" class="panel">
  <div class="card">
    <div class="ch"><h2>AYARLAR</h2><span class="bdg">YÖNETİM</span></div>
    <div class="cb">

      <div class="ss">
        <h3>🌳 Park Listesi</h3>
        <div class="tags" id="park-tags"></div>
        <div class="add-row"><input type="text" id="yp" placeholder="Yeni park..."><button class="btn-add" onclick="ekle('park')">+ Ekle</button></div>
      </div>

      <div class="ss">
        <h3>🎖️ Kıdem Listesi</h3>
        <div class="tags" id="kidem-tags"></div>
        <div class="add-row"><input type="text" id="yk" placeholder="Yeni kıdem..."><button class="btn-add" onclick="ekle('kidem')">+ Ekle</button></div>
      </div>

      <div id="vard-ayar-bolum"></div>

    </div>
  </div>
</div>

</div><!-- /main -->

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
//  HIZLI ŞABLONLAR
// ══════════════════════════════════════
// Vardiya tipini metne çevir
function vtipMt(vtip){
  if(!vtip) return 'vardiyada';
  if(vtip==='Sabit') return 'Sabit vardiyada';
  return vtip+'. vardiyada';
}

// Tutanak sonu
const ARZ = '\n\nGereğinin yapılmasını arz ederim.';

const SABLONLAR = [
  {
    id:'goreve_gelmemek',
    icon:'🚫', ad:'Göreve Gelmemek', alt:'Md.19',
    turNo:'19',
    metin: (t,p,vtip,vsaat,per,kid) =>
      `${t} Tarihinde ${p} Parkı ${vtipMt(vtip)} ${vsaat} saatleri arasında görevli olan ${kid} ${per}'in görevine gelmediği tespit edilmiş ve tutanak tarafımızca imza altına alınmıştır.${ARZ}`,
    format:'olay'
  },
  {
    id:'park_terk',
    icon:'🏃', ad:'Park Terk', alt:'Md.81',
    turNo:'81',
    metin: (t,p,vtip,vsaat,per,kid) =>
      `${t} Tarihinde ${p} Parkı ${vtipMt(vtip)} ${vsaat} saatleri arasında görevli olan ${kid} ${per}'in görev alanını (parkı) terk ettiği tespit edilmiş ve tutanak tarafımızca imza altına alınmıştır.${ARZ}`,
    format:'olay'
  },
  {
    id:'gec_gelme',
    icon:'⏰', ad:'Geç Gelme', alt:'Md.16-17',
    turNo:'16',
    metin: (t,p,vtip,vsaat,per,kid) =>
      `${t} Tarihinde ${p} Parkı ${vtipMt(vtip)} ${vsaat} saatleri arasında görevli olan ${kid} ${per}'in görev yerine geç geldiği tespit edilmiş ve tutanak tarafımızca imza altına alınmıştır.${ARZ}`,
    format:'olay'
  },
  {
    id:'erken_terk',
    icon:'🏃‍♂️', ad:'Erken Terk', alt:'Md.28',
    turNo:'28',
    metin: (t,p,vtip,vsaat,per,kid) =>
      `${t} Tarihinde ${p} Parkı ${vtipMt(vtip)} ${vsaat} saatleri arasında görevli olan ${kid} ${per}'in izinsiz olarak iş saati bitiminden evvel görev yerini terk ettiği tespit edilmiş ve tutanak tarafımızca imza altına alınmıştır.${ARZ}`,
    format:'olay'
  },
  {
    id:'kidem_ihlali',
    icon:'👔', ad:'Kıyafet İhlali', alt:'Md.63',
    turNo:'63',
    metin: (t,p,vtip,vsaat,per,kid) =>
      `${t} Tarihinde ${p} Parkı ${vtipMt(vtip)} ${vsaat} saatleri arasında görevli olan ${kid} ${per}'in kendisine teslim edilen kıyafet ve diğer aksesuarları uygun giymediği, takmadığı tespit edilmiş ve tutanak tarafımızca imza altına alınmıştır.${ARZ}`,
    format:'olay'
  },
  {
    id:'nobet_talimat',
    icon:'📋', ad:'Nöbet Talimatı', alt:'Md.66',
    turNo:'66',
    metin: (t,p,vtip,vsaat,per,kid) =>
      `${t} Tarihinde ${p} Parkı ${vtipMt(vtip)} ${vsaat} saatleri arasında görevli olan ${kid} ${per}'in nöbet talimatlarına uymadığı tespit edilmiş ve tutanak tarafımızca imza altına alınmıştır.${ARZ}`,
    format:'olay'
  },
  {
    id:'disiplin',
    icon:'📑', ad:'Disiplin Cetveli', alt:'89 madde',
    turNo:'',
    format:'resmi'
  }
];

// ══════════════════════════════════════
//  DİSİPLİN CETVELİ
// ══════════════════════════════════════
const CEZA = {
  "1":  {k:"Sürücü belgesi iptali bildirmemek",c:["4G","İ.Ç.","","",""],m:"Şirkete ait araçlarda görev yapan ÖGG'lerin sürücü belgesinin herhangi bir sebeple geçici yada kalıcı olarak iptal edilmesi durumunda sıralı sicil amirine bilgi vermemesi"},
  "2":  {k:"Vardiya devir-teslime katılmamak",c:["i","","","",""],m:"Vardiya devir-teslim saatlerinde nöbet bölgesinde devir teslime katılmamak"},
  "3":  {k:"Resmi üniforma ile sosyal medya paylaşımı",c:["2G","3G","4G","",""],m:"İş saatleri içerisinde ve iş saatleri sonrasında resmi üniforma ile sosyal medya üzerinden uygunsuz paylaşımlarda bulunmak (KVKK kanunu kapsamı dışında)"},
  "4":  {k:"İstirahat saatinde uygunsuz davranış",c:["3G","5G","İ.Ç.","",""],m:"İstirahat saatleri dışında görev alanında uygunsuz şekilde yemek yemek, sigara içmek v.b. davranışlarda bulunmak"},
  "5":  {k:"Eksik ekipmanla göreve çıkmak",c:["1G","2G","3G","",""],m:"ATV, bot, tekne, scooter ve araç sürücülerinin eksik ekipman ile göreve çıkması"},
  "6":  {k:"Emanet buluntuların kaybolmasına sebebiyet",c:["4G","İ.Ç.","","",""],m:"Emanete alınan buluntuların çalınmasına, yitirilmesine ve zarar görmesine sebebiyet verilmesi"},
  "7":  {k:"Aracı izinsiz kullandırmak",c:["2G","4G","İ.Ç.","",""],m:"Şirkete ait araçların görev tanımı uygun olmayan kişilere idareden izin almaksızın kullandırılması"},
  "8":  {k:"Demirbaşları 3. şahıslara vermek/satmak",c:["4G","İ.Ç.","","",""],m:"Şirkete ait demirbaşların 3. şahıslara verilmesi, satılması"},
  "9":  {k:"Alkol/uyuşturucu/kumar/fuhuş",c:["İ.Ç.","","","",""],m:"A) İş yerinde alkol ürünleri kullanmak, uyuşturucu madde kullanmak, kumar oynamak, fuhuş yapmak ve yapılmasına göz yummak\nB) Göreve alkollü gelmek: 5G İ.Ç."},

const V_PARK=['Öveçler Vadisi Parkı','Dikmen Vadisi Parkı','Altınpark'];
const V_KIDEM=['Amir','Ekip Şefi','ÖGG','ÖGS'];
const V_VARD={sabit:['08:00-18:00'],1:['08:00-20:00'],2:['20:00-08:00'],3:[],4:[]};

let parklar=yk('tm_p',V_PARK);
let kidemler=yk('tm_k',V_KIDEM);
let vardiyalar=yk('tm_v',V_VARD);
let secilenSablon=null;
let secilenKez=null;

function yk(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch(e){return d;}}
function kk(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

document.addEventListener('DOMContentLoaded',()=>{
  const b=new Date();
  document.getElementById('tarih').value=b.toISOString().split('T')[0];
  doldurPark(); doldurKidem(); renderSablonlar(); renderAyarlar(); renderCetvel();
  document.addEventListener('click',e=>{ if(!e.target.closest('.tur-wrap')) turKapat(); });
});

// ══════════════════════════════════════
//  SELECT DOLDURMALAR
// ══════════════════════════════════════
function doldurPark(){
  const s=document.getElementById('park');
  const v=s.value; s.innerHTML='<option value="">— Seçiniz —</option>';
  parklar.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;s.appendChild(o);});
  s.value=v;
}
function doldurKidem(){
  const s=document.getElementById('kidem');
  const v=s.value; s.innerHTML='<option value="">— Seçiniz —</option>';
  kidemler.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;s.appendChild(o);});
  s.value=v;
}
function vtipDegis(){
  const tip=document.getElementById('vtip').value;
  const sel=document.getElementById('vsaat');
  sel.innerHTML='<option value="">— Seçiniz —</option>';
  if(!tip) return;
  const key=tip==='Sabit'?'sabit':tip;
  const liste=(vardiyalar[key]||[]);
  if(!liste.length){sel.innerHTML='<option value="">— Ayarlardan ekleyin —</option>';return;}
  liste.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
}

function renderSablonlar(){
  const g=document.getElementById('sablon-grid');
  g.innerHTML=SABLONLAR.map(s=>`
    <button class="sablon-btn${secilenSablon===s.id?' on':''}" onclick="sablonSec('${s.id}')">
      <span class="sb-icon">${s.icon}</span>
      <span class="sb-ad">${s.ad}</span>
      <span class="sb-alt">${s.alt}</span>
    </button>`).join('');
}

function sablonSec(id){
  secilenSablon = secilenSablon===id ? null : id;
  renderSablonlar();
  const fg=document.getElementById('fg-tur');
  const s=SABLONLAR.find(x=>x.id===id);
  if(secilenSablon && s && s.id!=='disiplin'){
    // Hızlı şablon seçildi — disiplin alanını gizle
    fg.style.display='none';
    document.getElementById('form-baslik').textContent=s.ad.toUpperCase();
    document.getElementById('tur-no').value=s.turNo||'';
    document.getElementById('tur-ara').value=s.turNo?`Md.${s.turNo} — ${s.ad}`:'';
    document.getElementById('cpanel').style.display='none';
  } else {
    fg.style.display='block';
    document.getElementById('form-baslik').textContent='YENİ TUTANAK';
    if(!secilenSablon){
      document.getElementById('tur-no').value='';
      document.getElementById('tur-ara').value='';
      document.getElementById('cpanel').style.display='none';
    }
  }
}

// ══════════════════════════════════════
//  TUTANAK TÜRÜ ARAMA
// ══════════════════════════════════════
function turAc(){
  const dd=document.getElementById('tur-dd');
  dd.style.display='block';
  turAra(document.getElementById('tur-ara').value);
}
function turKapat(){ document.getElementById('tur-dd').style.display='none'; }
function turAra(q){
  const dd=document.getElementById('tur-dd');
  dd.style.display='block';
  const ql=q.toLowerCase().trim();
  const res=Object.entries(CEZA).filter(([no,m])=>
    no.toLowerCase().includes(ql)||m.k.toLowerCase().includes(ql)||m.m.toLowerCase().includes(ql));
  if(!res.length){dd.innerHTML='<div class="tur-opt" style="color:#999;cursor:default;">Sonuç bulunamadı</div>';return;}
  dd.innerHTML=res.map(([no,m])=>`
    <div class="tur-opt" onclick="turSec('${no}')">
      <span class="opt-no">Md.${no}</span>${m.k}
    </div>`).join('');
}
function turSec(no){
  const m=CEZA[no]; if(!m) return;
  document.getElementById('tur-ara').value=`Md.${no} — ${m.k}`;
  document.getElementById('tur-no').value=no;
  turKapat(); cezaPanel(no);
}
function cezaPanel(no){
  const m=CEZA[no];
  const p=document.getElementById('cpanel');
  if(!m){p.style.display='none';return;}
  secilenKez=null;
  document.getElementById('cp-bas').textContent=`Madde ${no} — ${m.k}`;
  document.getElementById('cp-mt').textContent=m.m;
  const lbls=['1.Kez','2.Kez','3.Kez','4.Kez','5.Kez'];
  document.getElementById('kez-row').innerHTML=lbls.map((l,i)=>{
    const c=m.c[i]||'';
    return `<button class="kb${c?'':' off'}" ${c?'':'disabled'} onclick="kezSec(${i},'${c}','${no}')">${l}${c?': '+c:' —'}</button>`;
  }).join('');
  document.getElementById('kez-res').textContent='';
  p.style.display='block';
}
function kezSec(i,c,no){
  if(!c) return;
  secilenKez={idx:i+1,ceza:c,no};
  document.querySelectorAll('.kb').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.getElementById('kez-res').textContent=`Seçilen: ${i+1}. Kez — Ceza: ${c}`;
}

// ══════════════════════════════════════
//  TUTANAK OLUŞTUR
// ══════════════════════════════════════
function olustur(){
  const tarihVal=document.getElementById('tarih').value;
  const park=document.getElementById('park').value;
  const vtip=document.getElementById('vtip').value;
  const vsaat=document.getElementById('vsaat').value;
  const per=document.getElementById('personel').value.trim();
  const kid=document.getElementById('kidem').value;
  const turNo=document.getElementById('tur-no').value;
  const aciklama=document.getElementById('aciklama').value.trim();

  if(!park||!vtip||!vsaat||!per||!kid){
    toast('⚠️ Lütfen tüm zorunlu alanları doldurunuz!',false); return;
  }

  const [y,m,d]=tarihVal.split('-');
  const t=`${d}.${m}.${y}`;
  const vtipMetin=vtipMt(vtip);

  let htmlIcerik='';
  const sablon=SABLONLAR.find(s=>s.id===secilenSablon);

  if(sablon && sablon.id!=='disiplin' && sablon.metin){
    // HIZLI ŞABLON — Olay Yeri formatı
    let metin=sablon.metin(t,park,vtip,vsaat,per,kid);
    if(aciklama) metin+=`\n\n${aciklama}`;
    htmlIcerik=`
      <div class="oy-yer">Olay Yeri: ${park}</div>
      <div class="oy-txt">${metin.replace(/\n/g,'<br>')}</div>`;
  } else if(turNo){
    // DİSİPLİN CETVELİ — Resmi tutanak
    const madde=CEZA[turNo];
    const ilk=(madde?madde.m.split('\n')[0].replace(/^A\)\s*/,''):'');
    let metin=`${t} Tarihinde ${park} Parkı ${vtipMetin} ${vsaat} saatleri arasında görevli olan ${kid} ${per}'in `;
    metin+=ilk.charAt(0).toLowerCase()+ilk.slice(1);
    if(!metin.endsWith('.')||metin.endsWith('mak')||metin.endsWith('mek'))
      metin+=' tespit edilmiş ve tutanak tarafımızca imza altına alınmıştır.';
    if(aciklama) metin+=`\n\n${aciklama}`;
    metin+='\n\nGereğinin yapılmasını arz ederim.';

    const kezHtml=secilenKez?`<div style="margin-bottom:12px;padding:7px 11px;background:#fff3e0;border:1px solid #ffc966;border-radius:6px;font-size:12px;font-family:'Segoe UI',sans-serif;"><strong>📊 ${secilenKez.idx}. Kez — Ceza: ${secilenKez.ceza}</strong></div>`:'';
    const maddeRef=madde?`Md.${turNo} — ${madde.k}`:turNo;

    htmlIcerik=`
      <div class="tk"><div class="ku">GÜVENLİK HİZMETLERİ</div><div class="ka">Tutanak Belgesi</div></div>
      <hr class="thr1"><hr class="thr2">
      <div class="tb2">T U T A N A K</div>
      <div class="tm">
        <div><span>Tarih: </span><strong>${t}</strong></div>
        <div><span>Konu: </span><strong>${maddeRef}</strong></div>
      </div>
      ${kezHtml}
      <div class="txt">${metin.replace(/\n/g,'<br>')}</div>
      <div class="timz">${t}<br>Tutanağı Düzenleyen</div>`;
  } else {
    toast('⚠️ Lütfen bir tutanak türü veya şablon seçiniz!',false); return;
  }

  document.getElementById('preview').innerHTML=htmlIcerik;
  window._pdfData={tarih:tarihVal,per,htmlIcerik};
  document.getElementById('prev-wrap').classList.add('on');
  document.getElementById('prev-wrap').scrollIntoView({behavior:'smooth',block:'start'});
  toast('✅ Tutanak oluşturuldu!',true);
}

// ══════════════════════════════════════
//  PDF
// ══════════════════════════════════════
function pdfAl(){
  const el=document.getElementById('preview');
  if(!el||!el.innerHTML.trim()){toast('Önce tutanak oluşturun!',false);return;}
  const d=window._pdfData||{};
  const tarih=(d.tarih||'').replace(/-/g,'');
  const per=(d.per||'personel').replace(/\s+/g,'_');
  const opt={
    margin:[15,15,15,15],
    filename:`Tutanak_${per}_${tarih}.pdf`,
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  };
  toast('📄 PDF hazırlanıyor...',true);
  // Klonu geçici olarak body'e ekle, html2pdf uygula
  const klon=document.createElement('div');
  klon.style.cssText='width:170mm;padding:10mm;font-family:Times New Roman,serif;color:#111;line-height:1.9;background:#fff;';
  klon.innerHTML=el.innerHTML;
  document.body.appendChild(klon);
  html2pdf().set(opt).from(klon).save().then(()=>{
    document.body.removeChild(klon);
    toast('✅ PDF indirildi!',true);
  });
}

// ══════════════════════════════════════
//  DİSİPLİN CETVELİ GÖRÜNÜMÜ
// ══════════════════════════════════════
function renderCetvel(filtre){
  const el=document.getElementById('cetveltablo');
  const ql=(filtre||'').toLowerCase();
  const girdi=Object.entries(CEZA).filter(([no,m])=>
    !ql||no.toLowerCase().includes(ql)||m.k.toLowerCase().includes(ql)||m.m.toLowerCase().includes(ql));

  const kezLabels=['1.Kez','2.Kez','3.Kez','4.Kez','5.Kez'];

  el.innerHTML=girdi.map(([no,m],i)=>{
    const cezalar=m.c.map((c,idx)=>c?`<span style="display:inline-flex;align-items:center;gap:3px;background:#fff3e0;border:1px solid #ffc966;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;color:#b35a00;margin:2px;"><span style="color:#999;font-weight:400;font-size:10px;">${kezLabels[idx]}:</span> ${c}</span>`:'').filter(Boolean).join('');
    return `<div onclick="cetvelSec('${no}')" style="background:${i%2?'#f8f9fd':'#fff'};border-bottom:1px solid #e8eaf0;padding:12px 14px;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='#eef1ff'" onmouseout="this.style.background='${i%2?'#f8f9fd':'#fff'}'">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;">
        <span style="flex-shrink:0;background:var(--navy);color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px;margin-top:1px;">Md.${no}</span>
        <span style="font-size:13px;font-weight:600;color:var(--navy);line-height:1.4;">${m.k}</span>
      </div>
      <div style="padding-left:4px;">${cezalar||'<span style="font-size:11px;color:#999;">Ceza bilgisi yok</span>'}</div>
    </div>`;
  }).join('');

  if(!girdi.length) el.innerHTML='<div style="text-align:center;padding:40px;color:#999;">Sonuç bulunamadı</div>';
}
function cetvelAra(q){ renderCetvel(q); }
function cetvelSec(no){
  gTab('olustur',document.querySelector('.tb'));
  // Disiplin şablonunu aktifleştir
  sablonSec('disiplin');
  turSec(no);
  document.getElementById('tab-olustur').scrollIntoView({behavior:'smooth'});
  toast(`Md.${no} seçildi — formu doldurun`,true);
}

// ══════════════════════════════════════
//  AYARLAR
// ══════════════════════════════════════
function renderAyarlar(){
  renderTags('park-tags',parklar,'park');
  renderTags('kidem-tags',kidemler,'kidem');
  const b=document.getElementById('vard-ayar-bolum');
  const tipler=[['sabit','Sabit Vardiya'],['1','1. Vardiya'],['2','2. Vardiya'],['3','3. Vardiya'],['4','4. Vardiya']];
  b.innerHTML=tipler.map(([tip,ad])=>`
    <div class="ss">
      <h3>🕐 Vardiya Saatleri — ${ad}</h3>
      <div class="tags" id="vt-${tip}"></div>
      <div class="add-row">
        <input type="text" id="yv-${tip}" placeholder="Örn: 08:00-18:00">
        <button class="btn-add" onclick="vardEkle('${tip}')">+ Ekle</button>
      </div>
    </div>`).join('');
  tipler.forEach(([tip])=>renderTags(`vt-${tip}`,vardiyalar[tip]||[],`vard_${tip}`));
}
function renderTags(cid,liste,tip){
  const el=document.getElementById(cid); if(!el) return;
  el.innerHTML=liste.map((item,i)=>`
    <span class="tag">${item}<button class="tdel" onclick="tagSil('${tip}',${i})">×</button></span>`).join('');
}
function tagSil(tip,idx){
  if(tip==='park'){parklar.splice(idx,1);kk('tm_p',parklar);doldurPark();}
  else if(tip==='kidem'){kidemler.splice(idx,1);kk('tm_k',kidemler);doldurKidem();}
  else if(tip.startsWith('vard_')){
    const t=tip.replace('vard_','');
    if(!vardiyalar[t]) return;
    vardiyalar[t].splice(idx,1);kk('tm_v',vardiyalar);
  }
  renderAyarlar(); toast('Silindi',false);
}
function ekle(tip){
  if(tip==='park'){
    const v=document.getElementById('yp').value.trim(); if(!v) return;
    parklar.push(v);kk('tm_p',parklar);document.getElementById('yp').value='';doldurPark();
  } else {
    const v=document.getElementById('yk').value.trim(); if(!v) return;
    kidemler.push(v);kk('tm_k',kidemler);document.getElementById('yk').value='';doldurKidem();
  }
  renderAyarlar(); toast('✅ Eklendi',true);
}
function vardEkle(tip){
  const v=document.getElementById(`yv-${tip}`).value.trim(); if(!v) return;
  if(!vardiyalar[tip]) vardiyalar[tip]=[];
  vardiyalar[tip].push(v);kk('tm_v',vardiyalar);
  document.getElementById(`yv-${tip}`).value='';
  renderAyarlar(); vtipDegis(); toast('✅ Eklendi',true);
}

// ══════════════════════════════════════
//  YARDIMCI
// ══════════════════════════════════════
function gTab(tab,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  if(el) el.classList.add('on');
  else document.querySelector(`.tb[onclick*="${tab}"]`)?.classList.add('on');
}
function temizle(){
  ['park','vtip','vsaat','kidem'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('personel').value='';
  document.getElementById('aciklama').value='';
  document.getElementById('tur-ara').value='';
  document.getElementById('tur-no').value='';
  document.getElementById('cpanel').style.display='none';
  document.getElementById('prev-wrap').classList.remove('on');
  document.getElementById('fg-tur').style.display='block';
  document.getElementById('form-baslik').textContent='YENİ TUTANAK';
  secilenSablon=null; secilenKez=null; window._pdfData=null;
  renderSablonlar();
}
function toast(msg,ok){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast ${ok?'g':'b'} on`;
  setTimeout(()=>el.classList.remove('on'),2800);
}
</script>
